services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundval}
      POSTGRES_USER: ${POSTGRES_USER:-fundval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 🔴 优化 1：拉长健康检查间隔（从 5s 改为 30s），大幅降低对 Windows 网络栈的冲击
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundval}"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - fundval

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    # 🔴 优化 2：同样拉长 Redis 的健康检查间隔
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - fundval

  backend:
    image: ${BACKEND_IMAGE:-xiaoxu/fundval-live-backend:latest}
    command: gunicorn fundval.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --access-logfile - --error-logfile -
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
      # 测试环境：挂载本地后端代码，修改后可直接重新构建或重启容器生效
      - ./backend:/app
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 🔴 优化 3：把 HTTP 检查拉长到 30s，降低网络句柄消耗
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fundval

  celery-worker:
    image: ${BACKEND_IMAGE:-xiaoxu/fundval-live-backend:latest}
    entrypoint: []
    command: celery -A fundval worker -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
      # 测试环境：挂载本地后端代码，方便调试任务逻辑
      - ./backend:/app
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fundval

  celery-beat:
    image: ${BACKEND_IMAGE:-xiaoxu/fundval-live-backend:latest}
    entrypoint: []
    command: celery -A fundval beat -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
      # 测试环境：挂载本地后端代码，方便调试定时任务
      - ./backend:/app
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fundval

  frontend:
    build:
      context: ./frontend
    image: ${FRONTEND_IMAGE:-jasamine/fundval-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-21345}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fundval

volumes:
  postgres_data:
  config_data:

networks:
  fundval:
    driver: bridge
