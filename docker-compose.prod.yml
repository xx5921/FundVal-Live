services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundval}
      POSTGRES_USER: ${POSTGRES_USER:-fundval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 如需从宿主机访问数据库，取消注释并在 .env 设置 POSTGRES_PORT
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundval}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fundval

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    # 不暴露端口到宿主机，仅容器内通信
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fundval

  backend:
    image: ${BACKEND_IMAGE:-jasamine/fundval-backend:latest}
    command: gunicorn fundval.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --access-logfile - --error-logfile -
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fundval

  celery-worker:
    image: ${BACKEND_IMAGE:-jasamine/fundval-backend:latest}
    entrypoint: []
    command: celery -A fundval worker -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fundval

  celery-beat:
    image: ${BACKEND_IMAGE:-jasamine/fundval-backend:latest}
    entrypoint: []
    command: celery -A fundval beat -l ${CELERY_LOGLEVEL:-info}
    volumes:
      # 生产环境：只挂载配置目录，不挂载本地代码
      - config_data:/app/config
    environment:
      - DB_TYPE=postgresql
      - POSTGRES_DB=${POSTGRES_DB:-fundval}
      - POSTGRES_USER=${POSTGRES_USER:-fundval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fundval}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fundval

  frontend:
    image: ${FRONTEND_IMAGE:-jasamine/fundval-frontend:latest}
    ports:
      - "${FRONTEND_PORT:-21345}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fundval

volumes:
  postgres_data:
  config_data:

networks:
  fundval:
    driver: bridge
